name: Deploy MkDocs to SiteGround

# 当有代码推送到 main 分支时触发
on:
  push:
    branches:
      - main  # 如果您的主分支叫 master，请改成 master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 获取最新代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 3. 安装 MkDocs 和 Material 主题 (以及其他所需插件)
      - name: Install dependencies
        run: |
          pip install mkdocs-material
          pip install mkdocs-static-i18n
          # 如果您用了 jieba 分词，取消下面这行的注释
          # pip install mkdocs-material[imaging] jieba

      # 4. 构建静态网页
      - name: Build MkDocs
        run: mkdocs build

      # 5. 通过 FTP 同步到 SiteGround 服务器
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # 将刚才 build 生成的 site 文件夹内容传到服务器的 public_html 目录
          local-dir: ./site/
          server-dir: /public_html/